[sigil]
name = "emperor-system"
data_dir = "~/.sigil"

[providers.openrouter]
api_key = "${OPENROUTER_API_KEY}"
default_model = "minimax/minimax-m2.5"
fallback_model = "deepseek/deepseek-v3.2"
embedding_model = "openai/text-embedding-3-small"

[security]
autonomy = "supervised"
workspace_only = true
max_cost_per_day_usd = 10.0

[memory]
backend = "sqlite"
embedding_dimensions = 1536
vector_weight = 0.6
keyword_weight = 0.4
temporal_decay_halflife_days = 30
mmr_lambda = 0.7
chunk_size_tokens = 400
chunk_overlap_tokens = 80

[heartbeat]
enabled = false
default_interval_minutes = 30

# Agent lifecycle engine — autonomous reflection, evolution, proactive scanning
[lifecycle]
enabled = true
model = "minimax/MiniMax-M1"

# Global repo pool — all agents can access all repos
[repos]
sigil = "/home/claudedev/sigil"
algostaking = "/home/claudedev/algostaking-backend"
riftdecks = "/home/claudedev/riftdecks"
entity-legal = "/home/claudedev/sigil/projects/entity-legal/web"

# System team — overarching orchestrator
[team]
leader = "aurelia"
agents = ["aurelia"]
router_model = "google/gemini-2.0-flash-001"
router_cooldown_secs = 60
max_background_cost_usd = 0.50

# Agents discovered from agents/{name}/agent.toml files on disk.
# See: agents/aurelia/agent.toml, agents/kael/agent.toml, etc.

[channels.telegram]
token_secret = "TELEGRAM_BOT_TOKEN"
allowed_chats = [-5229229023]
debounce_window_ms = 3000

# Orchestration tuning — v3 feature activation
[orchestrator]
expertise_routing = true
adaptive_retry = true
failure_analysis_model = "minimax/minimax-m2.5"
preflight_enabled = true
preflight_model = "minimax/minimax-m2.5"
preflight_max_cost_usd = 0.02
decomposition_model = "minimax/minimax-m2.5"
auto_redecompose = true
infer_deps_threshold = 0.6
blackboard_transient_ttl_hours = 48
blackboard_durable_ttl_days = 14

# Watchdog rules — event-driven automation
[[watchdogs]]
name = "failure-spike"
cooldown_secs = 7200
enabled = true
[watchdogs.condition]
event = "task_failed"
project_filter = "gacha-agency"
count_threshold = 3
window_secs = 3600
[watchdogs.action.escalate]
message = "3+ task failures in gacha-agency within 1 hour"

[[watchdogs]]
name = "budget-warning"
cooldown_secs = 14400
enabled = true
[watchdogs.condition]
event = "budget_threshold_reached"
count_threshold = 1
window_secs = 86400
budget_threshold = 0.8
[watchdogs.action.escalate]
message = "Budget usage exceeded 80%"

[[watchdogs]]
name = "worker-timeout-alert"
cooldown_secs = 3600
enabled = true
[watchdogs.condition]
event = "worker_timeout"
project_filter = "gacha-agency"
count_threshold = 2
window_secs = 1800
[watchdogs.action.escalate]
message = "Multiple worker timeouts in gacha-agency"

# Projects (repos, tasks, knowledge)
[[projects]]
name = "gacha-agency"
prefix = "ga"
repo = "/home/claudedev/sigil"
model = "claude-sonnet-4-6"
max_workers = 2
execution_mode = "claude_code"
worker_timeout_secs = 1800
max_turns = 20
team.leader = "void"
team.agents = ["void"]

[[projects]]
name = "algostaking"
prefix = "as"
repo = "/home/claudedev/algostaking-backend"
model = "claude-sonnet-4-6"
max_workers = 3
worktree_root = "/home/claudedev/worktrees"
execution_mode = "claude_code"
max_turns = 25
worker_timeout_secs = 3600
team.leader = "kael"
team.agents = ["kael"]

[[projects]]
name = "riftdecks-shop"
prefix = "rd"
repo = "/home/claudedev/riftdecks"
model = "claude-sonnet-4-6"
max_workers = 2
execution_mode = "claude_code"
worker_timeout_secs = 1800
team.leader = "mira"
team.agents = ["mira"]

[[projects]]
name = "entity-legal"
prefix = "el"
repo = "/home/claudedev/sigil/projects/entity-legal/web"
model = "claude-sonnet-4-6"
max_workers = 2
execution_mode = "claude_code"
worker_timeout_secs = 1800
team.leader = "mira"
team.agents = ["mira"]
